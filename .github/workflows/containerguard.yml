name: ContainerGuard AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests (Skills)
        run: uv run python -m pytest tests/test_skills.py -v --tb=short

      - name: Run unit tests (Agents)
        run: uv run python -m pytest tests/test_agents.py -v --tb=short

      - name: Run demo verification
        run: uv run python scripts/demo_agents.py

      - name: Run Baseline experiment
        run: uv run python scripts/run_baseline.py

      - name: Run progress check
        run: uv run python scripts/check_progress.py

  # PR 触发漏洞扫描 + 自动评论
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run vulnerability scan
        id: scan
        run: |
          uv run python scripts/run_baseline.py > scan_output.txt 2>&1
          echo "scan_complete=true" >> $GITHUB_OUTPUT

      - name: Generate PR comment
        id: comment
        run: |
          python3 << 'SCRIPT'
          import json, os
          
          # Load baseline results
          with open("docs/baseline_results.json") as f:
              data = json.load(f)
          
          ours = data["ours"]
          results = ours["results"]
          
          comment = "## 🛡️ ContainerGuard AI 漏洞扫描结果\n\n"
          comment += f"| 指标 | 结果 |\n|:---|:---|\n"
          comment += f"| 准确率 | **{ours['accuracy']*100:.0f}%** |\n"
          comment += f"| Unknown 率 | **{ours['unknown_rate']*100:.0f}%** |\n"
          comment += f"| 平均置信度 | **{ours['avg_confidence']*100:.0f}%** |\n\n"
          
          comment += "### CVE 判定详情\n\n"
          comment += "| CVE | 判定 | 置信度 | 耗时 |\n|:---|:---|:---|:---|\n"
          
          icons = {"affected": "🔴", "not_affected": "🟢", "unknown": "🟡"}
          for cve_id, r in results.items():
              icon = icons.get(r["status"], "❓")
              comment += f"| {cve_id} | {icon} {r['status']} | {r['confidence']*100:.0f}% | {r['time_seconds']:.1f}s |\n"
          
          comment += "\n---\n*Generated by ContainerGuard AI Multi-Agent System*"
          
          # Write to file for use in next step  
          with open("pr_comment.md", "w") as f:
              f.write(comment)
          SCRIPT

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md
